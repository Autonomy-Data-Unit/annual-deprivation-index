# QOF (Quality and Outcomes Framework) column mappings per year.
#
# Each entry maps the raw column names to a standardised schema:
#   practice_code, list_pop, {disease_code_1}, {disease_code_2}, ...
#
# The parser reads the config for a given year, applies the column mapping,
# pivots from long to wide format, and outputs the standardised schema.

# --- Pre-2013: Excel format with different disease codes ---
# These years use .xls/.xlsx files with different disease group codes
# (e.g. MENT instead of MH, DEP1, CVD-PP, HFLVD).
# They may need per-year handling beyond this config.

[years.2006_07]
format = "excel"
notes = "Pre-2013 Excel format; disease codes differ (MENT, DEP1, CVD-PP, HFLVD)"

[years.2007_08]
format = "excel"
notes = "Pre-2013 Excel format"

[years.2008_09]
format = "excel"
notes = "Pre-2013 Excel format"

[years.2009_10]
format = "excel"
notes = "Pre-2013 Excel format"

[years.2010_11]
format = "excel"
notes = "Pre-2013 Excel format"

[years.2011_12]
format = "excel"
notes = "Pre-2013 Excel format"

[years.2012_13]
format = "excel"
notes = "Pre-2013 Excel format"

# --- Era 1: 2013-14 ---
[years.2013_14]
format = "csv"
practice_code_col = "practicecode"
register_col = "disease_register_size"
list_pop_col = "practice_listsize"
disease_code_col = "indicator_group"
encoding = "utf-8"
file_pattern = "PREVALENCE_1314.csv"
notes = "Duplicate HF rows per practice; extra groups SMOK, THY (24 total)"

# --- Era 2: 2014-15 ---
[years.2014_15]
format = "csv"
practice_code_col = "PRACTICE_CODE"
register_col = "REGISTER_SIZE"
list_pop_col = "PRACTICE_LIST_SIZE"
disease_code_col = "INDICATOR_GROUP_CODE"
encoding = "cp1252"
file_pattern = "PREVALENCE_1415.csv"
notes = "Windows cp1252 encoding; has PRACTICE_NAME column"

